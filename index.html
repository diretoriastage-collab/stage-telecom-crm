<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Teste - Aba Promoções</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; padding: 20px; }
        button { background: #e74c3c; border: none; color: white; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; }
        .tab { display: inline-block; background: #333; padding: 10px 20px; cursor: pointer; }
        .tab.active { background: #e74c3c; }
        .tab-content { display: none; margin-top: 20px; background: #16213e; padding: 20px; border-radius: 10px; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #555; padding: 8px; text-align: left; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border-radius: 5px; border: none; }
        .btn-glass-danger { background: #ff4757; }
    </style>
</head>
<body>
    <h1>Teste de Promoções</h1>
    <div>
        <div class="tab active" onclick="mostrarAba('promocoes')">🏆 Promoções</div>
    </div>
    <div id="aba-promocoes" class="tab-content active">
        <button onclick="mostrarFormPromocao()">+ Nova Promoção</button>
        <div id="formPromocao" style="display:none; margin-top:20px; background:#0f3460; padding:20px; border-radius:10px;">
            <h3>Criar Meta Bônus</h3>
            <div class="form-group">
                <label>Tipo:</label>
                <select id="tipoPromocao"><option value="vendas">Vendas</option><option value="produtos">Produtos</option><option value="instalacoes">Instalações</option></select>
            </div>
            <div class="form-group">
                <label>Quantidade:</label>
                <input type="number" id="quantidadePromocao" min="1" value="10">
            </div>
            <div class="form-group">
                <label>Início (data e hora):</label>
                <input type="datetime-local" id="inicioPromocao">
            </div>
            <div class="form-group">
                <label>Fim (data e hora):</label>
                <input type="datetime-local" id="fimPromocao">
            </div>
            <div class="form-group">
                <label>Prêmio:</label>
                <input type="text" id="premioPromocao" placeholder="Ex: R$ 500">
            </div>
            <button onclick="cadastrarPromocao()">Salvar</button>
            <button onclick="fecharForm()">Cancelar</button>
        </div>
        <div id="listaPromocoes">
            <table id="tabelaPromocoes">
                <thead><tr><th>Tipo</th><th>Qtd</th><th>Período</th><th>Prêmio</th><th>Status</th><th>Ações</th></tr></thead>
                <tbody id="tbodyPromocoes"></tbody>
            </table>
            <div id="vazioMsg" style="display:none;">Nenhuma promoção cadastrada</div>
        </div>
    </div>

    <script>
        let promocoes = [];

        function salvarDB() {
            localStorage.setItem('teste_promocoes', JSON.stringify(promocoes));
        }
        function carregarDB() {
            let data = localStorage.getItem('teste_promocoes');
            if (data) promocoes = JSON.parse(data);
            else promocoes = [];
        }
        function mostrarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('aba-' + aba).classList.add('active');
            if (aba === 'promocoes') carregarLista();
        }
        function mostrarFormPromocao() {
            document.getElementById('formPromocao').style.display = 'block';
        }
        function fecharForm() {
            document.getElementById('formPromocao').style.display = 'none';
            document.getElementById('premioPromocao').value = '';
            document.getElementById('quantidadePromocao').value = 10;
            document.getElementById('inicioPromocao').value = '';
            document.getElementById('fimPromocao').value = '';
        }
        function cadastrarPromocao() {
            let tipo = document.getElementById('tipoPromocao').value;
            let quantidade = parseInt(document.getElementById('quantidadePromocao').value);
            let inicio = document.getElementById('inicioPromocao').value;
            let fim = document.getElementById('fimPromocao').value;
            let premio = document.getElementById('premioPromocao').value.trim();
            if (!inicio || !fim || !premio || isNaN(quantidade) || quantidade <= 0) {
                alert('Preencha todos os campos corretamente!');
                return;
            }
            if (new Date(inicio) >= new Date(fim)) {
                alert('A data de fim deve ser posterior à data de início.');
                return;
            }
            let nova = { id: Date.now(), tipo, quantidade, inicio, fim, premio, concluida: false, vencedores: [] };
            promocoes.push(nova);
            salvarDB();
            fecharForm();
            carregarLista();
            alert('Promoção criada!');
        }
        function carregarLista() {
            let agora = new Date();
            for (let p of promocoes) {
                let inicio = new Date(p.inicio);
                let fim = new Date(p.fim);
                if (agora < inicio) p.status = 'Aguardando';
                else if (agora >= inicio && agora <= fim) p.status = 'Ativa';
                else if (agora > fim && !p.concluida) p.status = 'Encerrada';
                else p.status = p.concluida ? 'Concluída' : 'Encerrada';
            }
            let tbody = document.getElementById('tbodyPromocoes');
            let divVazio = document.getElementById('vazioMsg');
            if (!tbody) return;
            if (promocoes.length === 0) {
                tbody.innerHTML = '';
                divVazio.style.display = 'block';
                return;
            }
            divVazio.style.display = 'none';
            let html = '';
            for (let p of promocoes) {
                let periodo = new Date(p.inicio).toLocaleString() + ' → ' + new Date(p.fim).toLocaleString();
                html += `<tr>
                    <td>${p.tipo}</td>
                    <td>${p.quantidade}</td>
                    <td>${periodo}</td>
                    <td>${p.premio}</td>
                    <td>${p.status}</td>
                    <td><button onclick="excluirPromocao(${p.id})">Excluir</button></td>
                </tr>`;
            }
            tbody.innerHTML = html;
        }
        function excluirPromocao(id) {
            if (confirm('Excluir?')) {
                promocoes = promocoes.filter(p => p.id !== id);
                salvarDB();
                carregarLista();
            }
        }
        // Inicialização
        carregarDB();
        carregarLista();
    </script>
</body>
</html>
